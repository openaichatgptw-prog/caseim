; Copia este archivo como Config.ini en la misma carpeta y rellena valores reales.
; Config.ini no se versiona (ver .gitignore en la raíz del repo).

[ARCHIVOS]
excel_precios        = C:\ruta\a\Lista de precios CNH Consolidadas Vigente.xlsx
excel_disponibilidad = C:\ruta\a\Lista Disponibilidad Origen.xlsx
excel_lista          = C:\ruta\a\Precios De Lista_Prueba.xlsx

[SALIDA]
duckdb       = pipeline.duckdb
csv          = precios_consolidados.csv
excel_salida = Precios_de_lista_enriquecidos.xlsx

[SQLSERVER]
server   = tu_servidor_sql,1433
database = TuBaseDeDatos
db_user  = tu_usuario
db_pass  = "tu_contraseña_segura"

[FACTORES]
factor_br  = 1.25
factor_usa = 1.25
factor_eur = 1.5

[TABLAS]
table_items         = items_referencias
table_items_precios = items_referencias_con_precios

[SALIDA_VENTAS]
excel = ventas_precios_cnh.xlsx
csv   = ventas_precios_cnh.csv

[SALIDA_ORIGEN]
excel = maestro_historico_porcentajes_por_origen_cnh.xlsx
csv   = maestro_historico_porcentajes_por_origen_cnh.csv
